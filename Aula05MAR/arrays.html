<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula de Arrays</title>

    <style>
/* =========================
   RESET E CONFIGURAÇÕES
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    /* Paleta inspirada na Suvinil */
    --azul-suvinil:#0057B8;
    --azul-claro:#3A86FF;
    --laranja:#FF6B35;
    --amarelo:#FFD166;
    --cinza-claro:#F4F6F8;
    --cinza-texto:#333;
    --branco:#ffffff;

    --sombra:0 10px 25px rgba(0,0,0,0.15);
}

body{
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg,var(--azul-suvinil),var(--azul-claro));
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* =========================
   CONTAINER PRINCIPAL
========================= */

.container{
    background:var(--branco);
    padding:40px;
    border-radius:16px;
    box-shadow:var(--sombra);
    width:90%;
    max-width:500px;
    text-align:center;
}

/* =========================
   TÍTULO
========================= */

h1{
    color:var(--azul-suvinil);
    margin-bottom:25px;
    font-size:28px;
    font-weight:700;
}

/* =========================
   INPUT
========================= */

input{
    width:70%;
    padding:12px 14px;
    border-radius:8px;
    border:2px solid #ddd;
    font-size:16px;
    transition:0.3s;
}

input:focus{
    border-color:var(--azul-claro);
    outline:none;
    box-shadow:0 0 8px rgba(58,134,255,0.4);
}

/* =========================
   BOTÃO
========================= */

button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    background:var(--laranja);
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    margin-left:8px;
    transition:0.3s;
}

button:hover{
    background:#e85b2a;
    transform:scale(1.05);
}

/* =========================
   LISTA DE ALUNOS
========================= */

#lista{
    margin-top:25px;
    padding:15px;
    background:var(--cinza-claro);
    border-radius:10px;
    color:var(--cinza-texto);
    text-align:left;
    line-height:1.8;
    font-size:16px;
}

/* =========================
   RESPONSIVIDADE
========================= */

@media(max-width:500px){

    input{
        width:100%;
        margin-bottom:10px;
    }

    button{
        width:100%;
        margin-left:0;
    }

}

    </style>
</head>
<body>

<div class="container">

<h1>Adicione os Alunos</h1>

<input type="text" id="aluno" placeholder="Digite o nome do aluno">
<button id="btnAdicionar" onclick="adicionarAluno()">Adicionar</button>

<p id="lista"></p>

</div>

<script src="../Aula05MAR/arrays.js"></script>

</body>
</html>
